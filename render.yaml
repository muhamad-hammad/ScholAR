services:
  - type: web
    name: scholar-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL_ID
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "false"
      - key: EMBEDDING_MODEL_ID
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHUNK_SIZE
        value: "1024"
      - key: CHUNK_OVERLAP
        value: "128"
      - key: RETRIEVER_TOP_K
        value: "4"
