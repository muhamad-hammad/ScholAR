services:
  - type: web
    name: scholar-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install torch --extra-index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: LANGSMITH_TRACING
        value: "false"
      - key: EMBEDDING_MODEL_ID
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHUNK_SIZE
        value: "1024"
      - key: CHUNK_OVERLAP
        value: "128"
      - key: RETRIEVER_K
        value: "4"
